<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة غير موجودة - دليل مصر</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page { display:flex; align-items:center; justify-content:center; min-height:70vh; flex-direction:column; text-align:center; padding:40px 20px; }
    .error-page h1 { font-size:clamp(48px,10vw,96px); font-weight:800; background:linear-gradient(135deg,#1A73E8,#0D47A1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; }
    .error-page p { font-size:18px; color:var(--text-secondary); margin:8px 0 32px; }
    .error-page .btn { font-size:16px; padding:12px 32px; }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>404</h1>
    <p>عذراً، الصفحة التي تبحث عنها غير موجودة</p>
    <a href="index.html" class="btn btn-primary">← العودة إلى الرئيسية</a>
  </div>
</body>
</html>
